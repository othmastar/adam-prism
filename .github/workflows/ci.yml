name: CI
on: [push, pull_request, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff build
          pip install -e .

      - name: Show environment
        run: |
          which python
          python --version
          pip list 2>&1 | head -40
          python -c "from adam.engine import AdamPrismEngine; print('✅ adam import OK')"

      - name: Run tests (file by file)
        run: |
          set -o pipefail
          for f in tests/test_*.py; do
            echo "=== Testing $f ==="
            python -m pytest "$f" -k "not slow" -v --tb=long 2>&1 || echo "FAILED: $f"
            echo ""
          done
          echo "=== ALL TESTS DONE ==="