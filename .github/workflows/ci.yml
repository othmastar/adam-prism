name: CI
on: [push, pull_request, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff build
          pip install -e .

      - name: Diagnostic — check environment
        run: |
          which python
          python --version
          python -c "import site; print('site-packages:', site.getsitepackages())"
          python -c "from adam.engine import AdamPrismEngine; print('adam import OK')" 2>&1 || echo "::error title=Import Error::Failed to import adam package"
          python -c "import tests.conftest; print(f'ollama={tests.conftest.ollama_available} api={tests.conftest.api_available}')" 2>&1 || true

      - name: Run tests
        id: run_tests
        run: |
          set -o pipefail
          python -m pytest tests/ -v -k "not slow" --tb=long -x 2>&1 | tee /tmp/test_output.txt

      - name: Show failures
        if: failure()
        run: |
          grep -n "FAILED" /tmp/test_output.txt | head -5 | while read line; do
            echo "::error file=tests,title=FAILED::$line"
          done
          # Print traceback lines near the failure
          awk '/FAILURES|Error|Traceback|assert /{print "::error file=tests,title=TRACE::" $0}' /tmp/test_output.txt | head -20

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: /tmp/test_output.txt

      - name: Build package
        run: python -m build --sdist --wheel