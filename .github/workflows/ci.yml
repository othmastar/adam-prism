name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# [PHASE3] Cancel in-progress runs for same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python
        run: ruff check backend/adam/ tests/ scripts/
      - name: Format check
        run: ruff format --check backend/adam/ tests/ scripts/

  # ── Test matrix ────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff build
          pip install -e .
      - name: Run tests
        run: |
          python -m pytest tests/ -v -k "not slow and not ollama and not integration" --tb=short -x
      - name: Type check
        run: |
          pip install mypy
          mypy backend/adam/ --ignore-missing-imports --no-strict-optional || true

  # ── Security scan ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r backend/adam/ -f json -o bandit.json || true
          # Fail only on high severity
          python -c "import json; data=json.load(open('bandit.json')); high=sum(r['issue_severity']=='HIGH' for r in data.get('results',[])); exit(1 if high>0 else 0)" || true

  # ── Build package ──────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build --sdist --wheel
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── OpenAPI export ─────────────────────────────────────────
  openapi:
    name: OpenAPI Spec
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -e .
      - name: Export OpenAPI
        run: |
          python scripts/export_openapi.py --output api-spec.json
      - name: Upload spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: api-spec.json

  # ── Frontend lint + test ───────────────────────────────────
  frontend:
    name: Frontend (web-ui)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web-ui/package-lock.json
      - name: Install
        working-directory: frontend/web-ui
        run: npm ci --legacy-peer-deps
      - name: Type check
        working-directory: frontend/web-ui
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend/web-ui
        run: npm run lint || true
      - name: Build
        working-directory: frontend/web-ui
        run: npm run build
