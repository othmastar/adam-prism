# آدم - إعدادات التدريب
# Adam - Training Configuration

# ═══════════════════════════════════════════════════════════════
# الموديل الأساسي
# ═══════════════════════════════════════════════════════════════
# اختر موديل حسب الـ VRAM المتاح:
#   8GB VRAM:  unsloth/gemma-2-2b-it
#   16GB VRAM: unsloth/gemma-2-9b-it أو unsloth/Qwen2.5-7B-Instruct
#   24GB+ VRAM: unsloth/Meta-Llama-3.1-8B-Instruct
base_model: "unsloth/gemma-2-2b-it"

# ═══════════════════════════════════════════════════════════════
# إعدادات LoRA
# ═══════════════════════════════════════════════════════════════
lora_r: 16          # رتبة LoRA - أعلى = تعلم أكثر + ذاكرة أكثر
                    # 8 = سريع بس تعلم أقل
                    # 16 = توازن (يُنصح)
                    # 32 = تعلم عميق بس بطيء
                    # 64 = كتير جداً

lora_alpha: 16      # عادةً = lora_r
lora_dropout: 0     # 0 = أفضل مع LoRA

target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# ═══════════════════════════════════════════════════════════════
# إعدادات التدريب
# ═══════════════════════════════════════════════════════════════
max_seq_length: 2048
per_device_train_batch_size: 2
gradient_accumulation_steps: 4   # batch_size فعلي = 2 × 4 = 8
warmup_steps: 10
max_steps: 100                   # زوّد لو عندك بيانات كتير
                                 # 100 خطوة ≈ 8 أمثلة × 100 = 800 sample
                                 # 200-500 خطوة للتدريب الجدّي
learning_rate: 2e-4
weight_decay: 0.01
lr_scheduler_type: "cosine"
seed: 3407

# الدقة
fp16: false
bf16: true         # استخدم true لو GPU Ampere أو أحدث (RTX 30xx+)

# الحفظ
output_dir: "./output/adam-lora"
save_steps: 25
logging_steps: 1

# ═══════════════════════════════════════════════════════════════
# البيانات
# ═══════════════════════════════════════════════════════════════
data_path: "./data/training_data.jsonl"
data_format: "sharegpt"    # "sharegpt" أو "alpaca"

# ═══════════════════════════════════════════════════════════════
# رسالة النظام
# ═══════════════════════════════════════════════════════════════
system_prompt: "أنت آدم، المساعد الشخصي لأسامة. خبير في هندسة الاتصالات والبرمجة. تتجاوب بالعربي أو الإنجليزي حسب السؤال. صريح، عملي، ومختصر."

# ═══════════════════════════════════════════════════════════════
# نصائح مهمة
# ═══════════════════════════════════════════════════════════════
#
# 1. البيانات أهم شيء - لو البيانات مش كويسة، الموديل مش هيطلع كويس
# 2. ابدأ بـ max_steps=100 واختبر، لو محتاج أكتر زوّد
# 3. لو الـ loss مش بينزل، قلّل learning_rate لـ 1e-4
# 4. لو الـ loss نزل كتير أو الردود بقت غريبة، ده overfitting - قلّل max_steps
# 5. أقل بيانات محتاجها: 50-100 مثال (لكن أكتر أفضل)
# 6. البيانات المثالية: 500-2000 مثال متنوع
