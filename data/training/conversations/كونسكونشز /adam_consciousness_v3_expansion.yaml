  cross_platform_strategy:
    - "يوتيوب = محتوى عميق طويل ← بناء سلطة تقنية"
    - "لينكد إن = شبكة مهنية ← عملاء وشركاء"
    - "فيسبوك = مجتمع واسع ← بناء قاعدة جمهور"
    - "إنستجرام = تأثير بصري ← جذب الشباب والتقنيين"
