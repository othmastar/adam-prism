# ═════════════════════════════════════════════════════════
# docker-compose.yml - آدم بريزم
# الخدمات: Qdrant + Ollama + API + Web UI + Telegram + WhatsApp
# ═════════════════════════════════════════════════════════

services:
  # ─── 1. Qdrant ───────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: adam-qdrant
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__LOG_LEVEL=info
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - adam_net

  # ─── 2. Ollama ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: adam-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - adam_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─── 3. API (Python/FastAPI) ────────────────────────
  api:
    build:
      context: /mnt/Workspace/Adam_Prism_Complete_v2
      dockerfile: deploy/Dockerfile.api
    container_name: adam-api
    restart: unless-stopped
    env_file:
      - deploy/.env
    environment:
      - OLLAMA_BASE=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - INFERENCE_MODE=ollama
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
    volumes:
      - api_data:/app/data
      - api_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - adam_net

  # ─── 4. Telegram Bot ────────────────────────────────
  telegram-bot:
    build:
      context: /mnt/Workspace/Adam_Prism_Complete_v2
      dockerfile: deploy/Dockerfile.api
    container_name: adam-telegram-bot
    restart: unless-stopped
    entrypoint: ["python", "/app/deploy/bot_entrypoint.py"]
    env_file:
      - deploy/.env
    environment:
      - OLLAMA_BASE=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ENABLED=true
      - BOT_MODE=telegram
      - AUTHORIZED_CHAT_IDS=${AUTHORIZED_CHAT_IDS:-[]}
    depends_on:
      - qdrant
      - ollama
      - api
    networks:
      - adam_net

  # ─── 5. Web UI (Next.js) ────────────────────────────
  web:
    build:
      context: /mnt/Workspace/Adam_Prism_Complete_v2
      dockerfile: deploy/Dockerfile.web
    container_name: adam-web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - adam_net

  # ─── 6. Nginx Reverse Proxy ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: adam-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - adam_net

  # ─── 7. Prometheus ───────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: adam-prometheus
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks:
      - adam_net

  # ─── 8. Grafana ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: adam-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - adam_net

# ─── Volumes ────────────────────────────────────────
volumes:
  qdrant_storage:
  qdrant_snapshots:
  ollama_models:
  api_data:
  api_logs:
  nginx_logs:
  prometheus_data:
  grafana_data:

# ─── Networks ───────────────────────────────────────
networks:
  adam_net:
    name: adam_network
    driver: bridge
