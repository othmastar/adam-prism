# ═════════════════════════════════════════════════════════
# docker-compose.yml - آدم بريزم (خام) | Workspace-local
# الخدمات: Qdrant + API + Web UI (بدون Ollama — شغال محلياً)
# ═════════════════════════════════════════════════════════

services:
  # ─── 1. Qdrant ───────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: adam-qdrant
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__LOG_LEVEL=info
    volumes:
      - /mnt/Workspace/Adam_Prism_Complete_v2/docker-data/qdrant/storage:/qdrant/storage
      - /mnt/Workspace/Adam_Prism_Complete_v2/docker-data/qdrant/snapshots:/qdrant/snapshots
    ports:
      - "6333:6333"
      - "6334:6334"

    networks:
      - adam_net

  # ─── 2. API (Python/FastAPI) ─────────────────────────
  api:
    build:
      context: /mnt/Workspace/Adam_Prism_Complete_v2
      dockerfile: deploy/Dockerfile.api
    container_name: adam-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OLLAMA_BASE=http://172.18.0.1:11434
      - QDRANT_URL=http://qdrant:6333
      - NOTEBOOK_PATH=/app/data/notebook
      - SUMMARY_OUTPUT_DIR=/app/data/notebook/summaries
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - /mnt/Workspace/Adam_Prism_Complete_v2/docker-data/api/data:/app/data
      - /mnt/Workspace/Adam_Prism_Complete_v2/docker-data/api/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - adam_net

  # ─── 3. Web UI (Next.js + Nginx) ─────────────────────
  web:
    build:
      context: /mnt/Workspace/Adam_Prism_Complete_v2
      dockerfile: deploy/Dockerfile.web
    container_name: adam-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - adam_net

# ─── Networks ─────────────────────────────────────────
networks:
  adam_net:
    name: adam_network
    driver: bridge
