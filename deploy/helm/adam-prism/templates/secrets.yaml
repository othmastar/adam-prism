apiVersion: v1
kind: Secret
metadata:
  name: {{ include "adam-prism.fullname" . }}-secrets
  labels:
    {{- include "adam-prism.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADAM_API_KEY: {{ .Values.secrets.apiKey | quote }}
  ADAM_ADMIN_KEY: {{ .Values.secrets.adminKey | quote }}
  ADAM_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.grafanaPassword | quote }}
