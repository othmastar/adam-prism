{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "adam-prism.fullname" . }}
  labels:
    {{- include "adam-prism.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "adam-prism.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
{{- end }}
