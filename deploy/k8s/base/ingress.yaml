apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adam-prism
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # [PHASE3] SSL redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - adam.example.com
      secretName: adam-prism-tls
  rules:
    - host: adam.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: adam-api
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: adam-api
                port:
                  number: 8000
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: adam-api
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: adam-api
                port:
                  number: 8000
