# [PHASE3] Secrets — must be replaced with sealed-secrets or external-secrets in production
# DO NOT commit real secrets to git
apiVersion: v1
kind: Secret
metadata:
  name: adam-secrets
type: Opaque
stringData:
  # Replace with strong random values before deployment
  # Generate with: openssl rand -hex 32
  ADAM_API_KEY: "CHANGE-ME-32-bytes-random-hex"
  ADAM_ADMIN_KEY: "CHANGE-ME-admin-key"
  ADAM_JWT_SECRET: "CHANGE-ME-jwt-secret-min-32-chars"
  NEXTAUTH_SECRET: "CHANGE-ME-nextauth-secret"
  GRAFANA_ADMIN_PASSWORD: "CHANGE-ME-grafana-password"
  # Database (if using external Postgres)
  POSTGRES_PASSWORD: "CHANGE-ME-postgres-password"
