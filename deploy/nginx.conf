# ═══════════════════════════════════════════
# Nginx Config - Adam Prism
# Reverse proxy للـ API والـ Web UI
# [M13-M14] Added rate limiting + TLS configuration
# ═══════════════════════════════════════════

upstream api_upstream {
    server api:8000;
}

upstream web_upstream {
    server web:3000;
}

# [M13] Rate limiting zone — 30 requests per second per IP
limit_req_zone $binary_remote_addr zone=adam_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=adam_ws:10m rate=10r/s;

# ─── HTTP → HTTPS redirect ────────────────────
server {
    listen 80;
    server_name _;

    # [M14] Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Health check endpoint available over HTTP for internal monitoring
    location /api/engine/health {
        proxy_pass http://api_upstream;
    }
}

# ─── HTTPS server ─────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # [M14] TLS configuration — self-signed cert as default
    # Replace with real certs in production (e.g., Let's Encrypt)
    ssl_certificate     /etc/nginx/ssl/adam-prism.crt;
    ssl_certificate_key /etc/nginx/ssl/adam-prism.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Static files للـ Web UI
    location /_next/static {
        alias /app/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /static {
        alias /app/public;
        expires 30d;
    }

    # API reverse proxy — [M13] with rate limiting
    location /api/ {
        limit_req zone=adam_api burst=60 nodelay;
        limit_req_status 429;

        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket للـ chat — [M13] with rate limiting
    location /ws/ {
        limit_req zone=adam_ws burst=20 nodelay;

        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # SSE stream
    location /api/engine/stream {
        proxy_pass http://api_upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
    }

    # Health endpoint
    location /api/engine/health {
        proxy_pass http://api_upstream;
    }

    # WhatsApp webhook (POST + GET للتأكيد)
    location /webhook/whatsapp {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # باقي المسارات → Web UI
    location / {
        proxy_pass http://web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/adam-prism-access.log;
    error_log /var/log/nginx/adam-prism-error.log;
}
