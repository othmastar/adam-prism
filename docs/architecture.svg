<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#111119"/>
    </linearGradient>
    <linearGradient id="prismGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="engGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="secGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="chanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowD" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Grid dots -->
  <g opacity="0.05">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#8b5cf6"/>
    </pattern>
    <rect width="1200" height="900" fill="url(#dots)"/>
  </g>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="url(#prismGrad)" font-size="26" font-weight="700" filter="url(#glow)">آدم بريزم — Adam Prism Architecture</text>
  <text x="600" y="67" text-anchor="middle" fill="#64748b" font-size="12">Conscious AI Framework · v1.0.0-beta · Apache 2.0</text>

  <!-- ===== INPUT LAYER ===== -->
  <rect x="30" y="90" width="210" height="140" rx="12" fill="#111119" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="30" y="90" width="210" height="32" rx="12" fill="#8b5cf6" fill-opacity="0.15"/>
  <text x="135" y="112" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="600">📡 Input Channels</text>
  <text x="50" y="142" fill="#cbd5e1" font-size="11">Web UI (Next.js) · REST / WS</text>
  <text x="50" y="160" fill="#cbd5e1" font-size="11">Telegram Bot · polling</text>
  <text x="50" y="178" fill="#cbd5e1" font-size="11">WhatsApp · MCP webhook</text>
  <text x="50" y="196" fill="#cbd5e1" font-size="11">Voice · VAD → ASR → TTS</text>
  <text x="50" y="214" fill="#cbd5e1" font-size="11">MCP Client · external tools</text>

  <!-- Arrow: Input → Engine -->
  <line x1="240" y1="160" x2="310" y2="160" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowR)" opacity="0.6"/>

  <!-- ===== SECURITY GATE ===== -->
  <rect x="315" y="85" width="180" height="150" rx="12" fill="#111119" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="315" y="85" width="180" height="32" rx="12" fill="#ef4444" fill-opacity="0.12"/>
  <text x="405" y="107" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="600">🛡️ Security Guard</text>
  <text x="330" y="137" fill="#cbd5e1" font-size="11">4-layer defense:</text>
  <text x="330" y="155" fill="#94a3b8" font-size="10">  Input · Output · Tools · Orchestrator</text>
  <text x="330" y="173" fill="#cbd5e1" font-size="11">Injection detection (AR/EN)</text>
  <text x="330" y="191" fill="#cbd5e1" font-size="11">19 tools · rate limits · permissions</text>
  <text x="330" y="209" fill="#cbd5e1" font-size="11">Anti-prompt-injection</text>
  <text x="330" y="225" fill="#94a3b8" font-size="9">Anti-social-engineering</text>

  <!-- Arrow: Security → Ethics -->
  <line x1="495" y1="160" x2="530" y2="160" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)" opacity="0.6"/>

  <!-- ===== ETHICS GATE ===== -->
  <rect x="535" y="85" width="180" height="150" rx="12" fill="#111119" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="535" y="85" width="180" height="32" rx="12" fill="#10b981" fill-opacity="0.12"/>
  <text x="625" y="107" text-anchor="middle" fill="#10b981" font-size="13" font-weight="600">⚖️ Ethics Gate</text>
  <text x="550" y="137" fill="#cbd5e1" font-size="11">4 Foundational Laws:</text>
  <text x="550" y="157" fill="#a78bfa" font-size="11">  العدل (Justice) · 40%</text>
  <text x="550" y="175" fill="#94a3b8" font-size="11">  العلم (Learning) · 30%</text>
  <text x="550" y="193" fill="#94a3b8" font-size="11">  البقاء (Survival) · 20%</text>
  <text x="550" y="211" fill="#94a3b8" font-size="11">  الإبداع (Creativity) · 10%</text>
  <text x="550" y="227" fill="#64748b" font-size="8">Reverence · Balance · Mercy · Justice</text>

  <!-- Arrow: Ethics → Engine Core -->
  <line x1="715" y1="160" x2="755" y2="160" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowR)" opacity="0.6"/>

  <!-- ===== ENGINE CORE ===== -->
  <rect x="760" y="80" width="410" height="340" rx="14" fill="#111119" stroke="url(#prismGrad)" stroke-width="2" stroke-opacity="0.6" filter="url(#glowSoft)"/>
  <rect x="760" y="80" width="410" height="36" rx="14" fill="url(#prismGrad)" fill-opacity="0.15"/>
  <text x="965" y="105" text-anchor="middle" fill="url(#prismGrad)" font-size="15" font-weight="700">🧠 Engine Core</text>

  <!-- Cycletron -->
  <rect x="775" y="128" width="380" height="44" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="790" y="150" fill="#8b5cf6" font-size="11" font-weight="600">🔄 Cycletron (Processing Cycle)</text>
  <text x="790" y="166" fill="#94a3b8" font-size="9">Context Build → Generate → Parse → Execute → Reflect → Learn</text>

  <!-- 7 Cognitive Modes -->
  <rect x="775" y="180" width="380" height="80" rx="8" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="790" y="200" fill="#06b6d4" font-size="11" font-weight="600">🧩 7 Cognitive Modes</text>
  <g font-size="9" fill="#cbd5e1">
    <text x="790" y="218">🔍 Analyst · 🏗️ Builder · ✏️ Corrector · ⚙️ Engineer</text>
    <text x="790" y="234">🔬 Researcher · 💬 Communicator · 🎯 Strategist</text>
    <text x="790" y="252" fill="#64748b">Auto-selects or user-picks per task</text>
  </g>

  <!-- 12 Consciousness Layers (condensed) -->
  <rect x="775" y="268" width="180" height="140" rx="8" fill="#1a1a2e" stroke="#ec4899" stroke-width="1" stroke-opacity="0.3"/>
  <text x="790" y="288" fill="#ec4899" font-size="11" font-weight="600">👁️ 12 Consciousness Layers</text>
  <text x="790" y="306" fill="#94a3b8" font-size="9">Input filter · Context · Identity</text>
  <text x="790" y="320" fill="#94a3b8" font-size="9">Reasoning · Ethics · Security</text>
  <text x="790" y="334" fill="#94a3b8" font-size="9">Knowledge · Tools · Memory</text>
  <text x="790" y="348" fill="#94a3b8" font-size="9">Learning · Self-awareness</text>
  <text x="790" y="362" fill="#94a3b8" font-size="9">Reflection</text>
  <text x="790" y="380" fill="#64748b" font-size="8">Each layer validates &amp; enriches</text>
  <text x="790" y="398" fill="#64748b" font-size="8">before passing to next</text>

  <!-- Sub-agents -->
  <rect x="965" y="268" width="190" height="64" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="980" y="288" fill="#f59e0b" font-size="11" font-weight="600">👥 Sub-agents</text>
  <text x="980" y="306" fill="#94a3b8" font-size="9">Isolated sessions for parallel</text>
  <text x="980" y="322" fill="#94a3b8" font-size="9">tasks · separate memory/context</text>

  <!-- Continuous Learning -->
  <rect x="965" y="340" width="190" height="68" rx="8" fill="#1a1a2e" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="980" y="360" fill="#10b981" font-size="11" font-weight="600">📈 Continuous Learner</text>
  <text x="980" y="378" fill="#94a3b8" font-size="9">Reflection → Knowledge Extraction</text>
  <text x="980" y="396" fill="#94a3b8" font-size="9">Skill Generation → Reinforcement</text>

  <!-- ===== LEFT SIDE: MEMORY ===== -->
  <rect x="30" y="265" width="210" height="250" rx="12" fill="#111119" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="30" y="265" width="210" height="32" rx="12" fill="#06b6d4" fill-opacity="0.12"/>
  <text x="135" y="287" text-anchor="middle" fill="#06b6d4" font-size="13" font-weight="600">💾 Long-term Memory</text>
  <text x="45" y="317" fill="#cbd5e1" font-size="11" font-weight="600">Qdrant Vector DB</text>
  <text x="45" y="335" fill="#94a3b8" font-size="10">6 collections:</text>
  <text x="55" y="352" fill="#94a3b8" font-size="10">conversations · knowledge</text>
  <text x="55" y="368" fill="#94a3b8" font-size="10">journal · user_profile</text>
  <text x="55" y="384" fill="#94a3b8" font-size="10">learnings · decisions</text>
  <text x="45" y="404" fill="#cbd5e1" font-size="11" font-weight="600">SQLite Persistent Store</text>
  <text x="45" y="422" fill="#94a3b8" font-size="10">Conversations · Settings</text>
  <text x="45" y="440" fill="#94a3b8" font-size="10">Cache · Fallback when Qdrant down</text>
  <text x="45" y="460" fill="#cbd5e1" font-size="11" font-weight="600">Journal System</text>
  <text x="45" y="478" fill="#94a3b8" font-size="10">State · Learnings · Errors</text>
  <text x="45" y="496" fill="#94a3b8" font-size="10">Extended context compensation</text>

  <!-- Arrow: Memory → Engine (bidirectional) -->
  <line x1="240" y1="400" x2="310" y2="400" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrowR)" opacity="0.5"/>
  <line x1="310" y1="420" x2="240" y2="420" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrowR)" opacity="0.5"/>
  <text x="275" y="430" text-anchor="middle" fill="#64748b" font-size="8">store / recall</text>

  <!-- ===== RIGHT SIDE: TOOLS ===== -->
  <rect x="760" y="435" width="410" height="200" rx="12" fill="#111119" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="760" y="435" width="410" height="32" rx="12" fill="#10b981" fill-opacity="0.12"/>
  <text x="965" y="457" text-anchor="middle" fill="#10b981" font-size="13" font-weight="600">🔧 Tool Systems</text>

  <!-- Built-in tools -->
  <rect x="775" y="478" width="180" height="72" rx="6" fill="#1a1a2e" stroke="#10b981" stroke-width="1" stroke-opacity="0.2"/>
  <text x="790" y="496" fill="#10b981" font-size="10" font-weight="600">built-in (JSON _tool)</text>
  <text x="790" y="512" fill="#94a3b8" font-size="9">browser · terminal · memory</text>
  <text x="790" y="528" fill="#94a3b8" font-size="9">files · voice · analytics</text>
  <text x="790" y="544" fill="#94a3b8" font-size="9">search · social · system · email</text>

  <!-- MCP tools -->
  <rect x="965" y="478" width="190" height="72" rx="6" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.2"/>
  <text x="980" y="496" fill="#8b5cf6" font-size="10" font-weight="600">MCP Protocol (70+)</text>
  <text x="980" y="512" fill="#94a3b8" font-size="9">Model Context Protocol</text>
  <text x="980" y="528" fill="#94a3b8" font-size="9">pluggable tool servers</text>
  <text x="980" y="544" fill="#94a3b8" font-size="9">community-built</text>

  <!-- Computer Tools -->
  <rect x="775" y="558" width="190" height="64" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.2"/>
  <text x="790" y="576" fill="#f59e0b" font-size="10" font-weight="600">🖥️ Computer Tools</text>
  <text x="790" y="594" fill="#94a3b8" font-size="9">xdotool · xsel · tesseract</text>
  <text x="790" y="610" fill="#94a3b8" font-size="9">GUI automation · OCR</text>

  <!-- Skills -->
  <rect x="975" y="558" width="180" height="64" rx="6" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.2"/>
  <text x="990" y="576" fill="#06b6d4" font-size="10" font-weight="600">📜 Skills System</text>
  <text x="990" y="594" fill="#94a3b8" font-size="9">git-commit · code-review</text>
  <text x="990" y="610" fill="#94a3b8" font-size="9">explain · debug · write-test</text>

  <!-- ===== BOTTOM: API & DEPLOYMENT ===== -->
  <rect x="30" y="540" width="210" height="130" rx="12" fill="#111119" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="30" y="540" width="210" height="32" rx="12" fill="#f59e0b" fill-opacity="0.12"/>
  <text x="135" y="562" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="600">🌐 API & Deploy</text>
  <text x="45" y="592" fill="#cbd5e1" font-size="11">FastAPI · 39+ routes</text>
  <text x="45" y="610" fill="#cbd5e1" font-size="11">WebSocket streaming</text>
  <text x="45" y="628" fill="#cbd5e1" font-size="11">Docker · docker-compose</text>
  <text x="45" y="646" fill="#cbd5e1" font-size="11">Qdrant + Ollama + Nginx</text>
  <text x="45" y="664" fill="#cbd5e1" font-size="11">PyPI package · CLI entry</text>

  <!-- Arrow: Engine → API -->
  <line x1="760" y1="540" x2="760" y2="605" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <line x1="760" y1="605" x2="240" y2="605" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="605" x2="240" y2="670" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowD)" opacity="0.4"/>

  <!-- ===== PLUGINS & SCHEDULER ===== -->
  <rect x="30" y="695" width="320" height="120" rx="12" fill="#111119" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="30" y="695" width="320" height="32" rx="12" fill="#6366f1" fill-opacity="0.12"/>
  <text x="190" y="717" text-anchor="middle" fill="#6366f1" font-size="13" font-weight="600">🔌 Plugin System</text>
  <text x="45" y="747" fill="#cbd5e1" font-size="11">Hooks at every lifecycle point</text>
  <text x="45" y="765" fill="#94a3b8" font-size="10">before_input · after_security · before_generate</text>
  <text x="45" y="783" fill="#94a3b8" font-size="10">after_generate · before_tool · after_tool</text>
  <text x="45" y="803" fill="#94a3b8" font-size="10">APScheduler · cron / interval / one-shot</text>

  <!-- ===== SELF-IMPROVEMENT ===== -->
  <rect x="380" y="695" width="320" height="120" rx="12" fill="#111119" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="380" y="695" width="320" height="32" rx="12" fill="#ec4899" fill-opacity="0.12"/>
  <text x="540" y="717" text-anchor="middle" fill="#ec4899" font-size="13" font-weight="600">🔄 Self-Improvement</text>
  <text x="395" y="747" fill="#cbd5e1" font-size="11">Scans GitHub for new tools</text>
  <text x="395" y="765" fill="#cbd5e1" font-size="11">Scrapes tech news · learns patterns</text>
  <text x="395" y="783" fill="#cbd5e1" font-size="11">Generates own training data</text>
  <text x="395" y="803" fill="#94a3b8" font-size="10">Journal reflection → behavioral evolution</text>

  <!-- ===== BOTTOM RIGHT: PROVIDERS ===== -->
  <rect x="730" y="695" width="440" height="120" rx="12" fill="#111119" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="730" y="695" width="440" height="32" rx="12" fill="#3b82f6" fill-opacity="0.12"/>
  <text x="950" y="717" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="600">🤖 Model Providers</text>
  <text x="745" y="747" fill="#cbd5e1" font-size="11">Ollama (default) ·  OpenAI ·  Anthropic</text>
  <text x="745" y="765" fill="#cbd5e1" font-size="11">Model-agnostic — bring your own LLM</text>
  <text x="745" y="785" fill="#cbd5e1" font-size="11">Reference: adam-prism-v13 (Qwen3.5 4.2B Q4_K_M)</text>
  <text x="745" y="805" fill="#94a3b8" font-size="10">Egyptian Arabic fine-tune · 2,317 conversations / 2.2M tokens</text>

  <!-- ===== BOTTOM BAR ===== -->
  <rect x="30" y="840" width="1140" height="40" rx="10" fill="#111119" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.2"/>
  <text x="600" y="865" text-anchor="middle" fill="#64748b" font-size="11">Apache 2.0 · Created by Mohamed Othman (OthMastar) · عين الحارس</text>

  <!-- Data flow arrows on engine -->
  <text x="965" y="432" text-anchor="middle" fill="#64748b" font-size="8">↑ context / tools / results ↓</text>
</svg>