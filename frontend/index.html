<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Prism — Showcase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, sans-serif;
            background: #0f172a; color: #e2e8f0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 2rem;
        }
        .container { max-width: 720px; width: 100%; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; margin-bottom: 2rem; }
        .badge {
            display: inline-block; padding: 0.25rem 0.75rem; background: #1e40af;
            color: #fff; border-radius: 9999px; font-size: 0.75rem; margin-right: 0.5rem;
        }
        .chat-box {
            background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem;
            padding: 1rem; margin-bottom: 1rem; min-height: 300px; max-height: 500px;
            overflow-y: auto;
        }
        .message { margin-bottom: 1rem; padding: 0.75rem; border-radius: 0.5rem; }
        .user { background: #1e40af; margin-right: 2rem; }
        .adam { background: #334155; margin-left: 2rem; }
        .label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.25rem; }
        .input-row { display: flex; gap: 0.5rem; }
        input {
            flex: 1; padding: 0.75rem; background: #1e293b; border: 1px solid #334155;
            border-radius: 0.5rem; color: #e2e8f0; font-size: 1rem;
        }
        button {
            padding: 0.75rem 1.5rem; background: #10b981; color: #fff; border: none;
            border-radius: 0.5rem; cursor: pointer; font-size: 1rem;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer { margin-top: 2rem; text-align: center; color: #64748b; font-size: 0.875rem; }
        .footer a { color: #10b981; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🪞 Adam Prism</h1>
        <p class="subtitle">
            <span class="badge">Showcase</span>
            <span class="badge">v1.0.0b1</span>
            <span class="badge">AGPL v3</span>
        </p>
        <p class="subtitle">النسخة التجريبية — 5 ميزات فقط. للنسخة الكاملة: <a href="mailto:othman@adam-prism.local" style="color: #10b981;">othman@adam-prism.local</a></p>

        <div class="chat-box" id="chatBox">
            <div class="message adam">
                <div class="label">آدم (Adam)</div>
                <div>أهلاً بيك! أنا النسخة التجريبية. اسألني أي سؤال، بس هجاوب بإجابات بسيطة عشان دي نسخة محدودة.</div>
            </div>
        </div>

        <div class="input-row">
            <input id="msgInput" type="text" placeholder="اكتب رسالتك هنا..." />
            <button id="sendBtn" onclick="send()">إرسال</button>
        </div>

        <div class="footer">
            <p>5 endpoints only · <a href="/docs">API Docs</a> · <a href="/metrics">Metrics</a> · <a href="/healthz/live">Health</a></p>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        async function send() {
            const msg = msgInput.value.trim();
            if (!msg) return;
            sendBtn.disabled = true;

            // Add user message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerHTML = `<div class="label">أنت</div><div>${escapeHtml(msg)}</div>`;
            chatBox.appendChild(userDiv);
            msgInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const resp = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await resp.json();
                const adamDiv = document.createElement('div');
                adamDiv.className = 'message adam';
                adamDiv.innerHTML = `<div class="label">آدم (Adam)</div><div>${escapeHtml(data.response)}</div>`;
                chatBox.appendChild(adamDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                const errDiv = document.createElement('div');
                errDiv.className = 'message adam';
                errDiv.innerHTML = `<div class="label">آدم (Adam)</div><div>Error: ${e.message}</div>`;
                chatBox.appendChild(errDiv);
            } finally {
                sendBtn.disabled = false;
                msgInput.focus();
            }
        }

        function escapeHtml(s) {
            return s.replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        msgInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
